<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Solucionarios | Portafolio</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>📚 Solucionarios por Curso</h1>
        <p>Prácticas dirigidas de Análisis Real, Ecuaciones Diferenciales y Análisis Numérico</p>
    </header>

    <main>
        <div id="contenedor-cursos">
            <div class="cargando">Cargando solucionarios...</div>
        </div>

        <!-- Visor PDF embebido (inicialmente oculto) -->
        <div id="visor-pdf" style="display: none; margin-top: 30px;">
            <h3>📖 Solución del ejercicio seleccionado</h3>
            <iframe id="pdf-iframe" style="width: 100%; height: 600px; border: 1px solid #ccc; border-radius: 8px;"></iframe>
        </div>
    </main>

    <footer>
        <p>Proyecto de portafolio - Actualizado continuamente con nuevos ejercicios</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
